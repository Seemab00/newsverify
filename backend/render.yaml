services:
  - type: web
    name: newsverify-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_AI_STUDIO_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: newsverify